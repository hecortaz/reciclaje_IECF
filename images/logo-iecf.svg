<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Fuego superior -->
  <path d="M 100 20 Q 90 35 95 50 Q 100 40 105 50 Q 110 35 100 20" fill="#FFD700" stroke="#FF8C00" stroke-width="1.5"/>
  <path d="M 95 30 Q 92 40 96 48 Q 100 42 104 48 Q 108 40 105 30" fill="#FF6B00"/>
  
  <!-- Banda verde con texto -->
  <rect x="30" y="55" width="140" height="25" rx="12" fill="#228B22" stroke="#000" stroke-width="2"/>
  <text x="100" y="73" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">AMOR Y CIENCIA</text>
  
  <!-- Círculo rojo principal -->
  <circle cx="100" cy="130" r="65" fill="#DC143C" stroke="#000" stroke-width="2"/>
  
  <!-- Texto circular rojo -->
  <path id="circlePath" d="M 35 130 A 65 65 0 0 1 165 130" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000" letter-spacing="2">
    <textPath href="#circlePath" startOffset="50%" text-anchor="middle">
      I.E. CINCUENTENARIO DE FABRICATO
    </textPath>
  </text>
  
  <!-- Letras CF entrecruzadas blancas -->
  <g transform="translate(100, 130)">
    <!-- C -->
    <path d="M -15 -20 Q -20 -15 -20 0 Q -20 15 -15 20" stroke="#FFF" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- F -->
    <path d="M 15 -20 L 15 0 M 15 -20 L 5 -20" stroke="#FFF" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 15 -5 L 5 -5" stroke="#FFF" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Banner negro inferior -->
  <rect x="40" y="200" width="120" height="30" rx="5" fill="#000" stroke="#000" stroke-width="1"/>
  <text x="100" y="222" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#FFD700">BELLO</text>
</svg>